<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Dashboard{% endblock %} — ourSpace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; color: #1a1a1a; background: #f4f5f7; }
    a { color: #0055cc; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Header */
    #header {
      background: #1a1a2e;
      color: #fff;
      padding: 0 24px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    #header .logo { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
    #header .logo span { color: #6699dd; }
    #header .user-area { display: flex; align-items: center; gap: 16px; font-size: 13px; }
    #header .user-area span { color: #8899bb; }
    #header .user-area a { color: #aac0ee; }
    #header .user-area a:hover { color: #fff; text-decoration: none; }

    /* Layout */
    #layout { display: flex; min-height: calc(100vh - 48px); }

    /* Sidebar */
    #sidebar {
      width: 210px;
      background: #fff;
      border-right: 1px solid #e2e4e9;
      padding: 12px 0;
      flex-shrink: 0;
    }
    .nav-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9aa0b0;
      padding: 10px 18px 4px;
    }
    #sidebar a {
      display: block;
      padding: 7px 18px;
      color: #333;
      font-size: 13px;
      border-left: 3px solid transparent;
    }
    #sidebar a:hover { background: #f0f4ff; color: #0055cc; text-decoration: none; }
    #sidebar a.active { background: #eef2ff; color: #0044aa; font-weight: 600; border-left-color: #0055cc; }

    /* Content */
    #content { flex: 1; padding: 28px 32px; max-width: 860px; }

    /* Typography */
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #111; }
    h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #222; }

    /* Cards */
    .card {
      background: #fff;
      border: 1px solid #e2e4e9;
      border-radius: 6px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f0f0f0;
    }

    /* Stats */
    .stat-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat {
      background: #fff;
      border: 1px solid #e2e4e9;
      border-radius: 6px;
      padding: 16px 20px;
      min-width: 130px;
      flex: 1;
    }
    .stat-number { font-size: 26px; font-weight: 700; color: #0055cc; line-height: 1; }
    .stat-label { font-size: 11px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* Table */
    .table-wrap { background: #fff; border: 1px solid #e2e4e9; border-radius: 6px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #777;
      padding: 10px 16px;
      background: #fafbfc;
      border-bottom: 1px solid #e2e4e9;
    }
    td { padding: 11px 16px; border-bottom: 1px solid #f0f2f5; vertical-align: middle; color: #222; font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbfc; }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 7px 16px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: inherit;
      text-decoration: none;
      line-height: 1;
    }
    .btn:hover { text-decoration: none; }
    .btn-primary { background: #0055cc; color: #fff; }
    .btn-primary:hover { background: #0044aa; color: #fff; }
    .btn-secondary { background: #eef0f3; color: #333; border: 1px solid #d8dce3; }
    .btn-secondary:hover { background: #e2e5ea; color: #333; }
    .btn-danger { background: #cc1a00; color: #fff; }
    .btn-danger:hover { background: #aa1600; color: #fff; }
    .btn-success { background: #1a6e35; color: #fff; }
    .btn-success:hover { background: #155929; color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* Badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-green { background: #d3f0dd; color: #0e5225; }
    .badge-red   { background: #fde8e8; color: #7a1a1a; }
    .badge-yellow{ background: #fff3cd; color: #664d00; }
    .badge-gray  { background: #eaecf0; color: #444; }

    /* Forms */
    .form-section { margin-bottom: 28px; }
    .form-section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #888;
      border-bottom: 1px solid #e8eaed;
      padding-bottom: 8px;
      margin-bottom: 16px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { margin-bottom: 14px; }
    .form-group.full { grid-column: 1 / -1; }
    label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #444; }
    input[type=text], input[type=email], input[type=url],
    input[type=date], input[type=time], select, textarea {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      color: #1a1a1a;
      background: #fff;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #0055cc;
      box-shadow: 0 0 0 2px #0055cc22;
    }
    .help-text { font-size: 11px; color: #888; margin-top: 3px; line-height: 1.4; }
    .error-text { font-size: 11px; color: #cc1a00; margin-top: 3px; }
    .form-actions { display: flex; gap: 10px; margin-top: 24px; padding-top: 20px; border-top: 1px solid #e8eaed; }

    /* Alerts */
    .alert { padding: 12px 16px; border-radius: 5px; margin-bottom: 20px; font-size: 13px; }
    .alert-info { background: #eef4ff; color: #0044aa; border: 1px solid #c0d8ff; }
    .alert-warn { background: #fffbeb; color: #854d00; border: 1px solid #ffe08a; }

    /* Misc */
    .actions { display: flex; gap: 6px; align-items: center; }
    .text-muted { color: #888; font-size: 12px; }
    .empty-state { text-align: center; color: #999; padding: 40px 20px; font-size: 13px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-header h2 { margin-bottom: 0; }
    .truncate { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>

<div id="header">
  <div class="logo">our<span>Space</span> <span style="color:#4a5568; font-weight:400; font-size:13px;">dashboard</span></div>
  <div class="user-area">
    <span>{{ request.user.username }}</span>
    <a href="{% url 'dashboard:logout' %}">Log out</a>
  </div>
</div>

<div id="layout">
  <div id="sidebar">
    <div class="nav-label">Overview</div>
    <a href="{% url 'dashboard:home' %}" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">Home</a>

    <div class="nav-label">Manage</div>
    <a href="{% url 'dashboard:event_edit' %}" class="{% if request.resolver_match.url_name == 'event_edit' %}active{% endif %}">Event Details</a>
    <a href="{% url 'dashboard:posts' %}" class="{% if 'post' in request.resolver_match.url_name %}active{% endif %}">Blog Posts</a>
    <a href="{% url 'dashboard:comments' %}" class="{% if 'comment' in request.resolver_match.url_name %}active{% endif %}">Comments</a>
    <a href="{% url 'dashboard:guests' %}" class="{% if request.resolver_match.url_name == 'guests' %}active{% endif %}">Guest List</a>

    {% if event %}
    <div class="nav-label">Event Page</div>
    <a href="{% url 'events:detail' event.pk %}" target="_blank">View Page ↗</a>
    {% endif %}
  </div>

  <div id="content">
    {% block content %}{% endblock %}
  </div>
</div>

</body>
</html>
