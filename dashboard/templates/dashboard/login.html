<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in — ourSpace Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: #f4f5f7;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #fff;
      border: 1px solid #e2e4e9;
      border-radius: 8px;
      padding: 36px 40px;
      width: 360px;
    }
    .logo { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .logo span { color: #0055cc; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 28px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #444; margin-bottom: 4px; }
    input[type=text], input[type=password] {
      width: 100%;
      padding: 8px 11px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 14px;
    }
    input:focus { outline: none; border-color: #0055cc; box-shadow: 0 0 0 2px #0055cc22; }
    .error {
      background: #fde8e8;
      color: #7a1a1a;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 14px;
      border: 1px solid #f5b8b8;
    }
    button {
      width: 100%;
      padding: 9px;
      background: #0055cc;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #0044aa; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">our<span>Space</span></div>
    <div class="subtitle">Dashboard login</div>

    {% if form.non_field_errors %}
      <div class="error">{{ form.non_field_errors|join:" " }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="id_username">Username</label>
      <input type="text" name="username" id="id_username" autofocus autocomplete="username">

      <label for="id_password">Password</label>
      <input type="password" name="password" id="id_password" autocomplete="current-password">

      <button type="submit">Log in</button>
    </form>
  </div>
</body>
</html>
