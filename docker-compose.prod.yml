services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-guestlist}
      POSTGRES_USER: ${POSTGRES_USER:-guestlist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guestlist}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-guestlist}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    command: >
      sh -c ".venv/bin/python manage.py migrate &&
             .venv/bin/python manage.py collectstatic --noinput &&
             .venv/bin/gunicorn config.wsgi:application --bind 0.0.0.0:80 --workers 2 --timeout 60"
    ports:
      - "80:80"
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
